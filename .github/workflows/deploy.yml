name: Deploy

on:
  push:
    tags:
      - 'deploy-*'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package release
        run: |
          set -euo pipefail
          mkdir -p dist
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./.sisyphus' \
            --exclude='./.claude/settings*.json' \
            --exclude='./.claude/project' \
            --exclude='./.env' \
            --exclude='./.env.*' \
            --exclude='./data' \
            --exclude='./dist' \
            -czf dist/release.tgz .

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload release package
        run: |
          set -euo pipefail
          scp -i ~/.ssh/deploy_key dist/release.tgz \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/ai-news-crowl-bot-release.tgz"

      - name: Deploy via SSH
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "GITHUB_SHA='${{ github.sha }}' bash -s" <<'REMOTE'
          set -euo pipefail

          APP_BASE="$HOME/ai-news-crowl-bot"
          SHARED_DIR="$APP_BASE/shared"
          RELEASE_DIR="$APP_BASE/releases/$GITHUB_SHA"
          COMPOSE_PROJECT_NAME="ai-news-crowl-bot"

          mkdir -p "$SHARED_DIR/data" "$APP_BASE/releases"

          if [ ! -f "$SHARED_DIR/.env" ] && [ -f "$APP_BASE/.env" ]; then
            cp "$APP_BASE/.env" "$SHARED_DIR/.env"
          fi

          if [ -d "$APP_BASE/data" ] && [ ! -L "$APP_BASE/data" ]; then
            if [ -z "$(find "$SHARED_DIR/data" -mindepth 1 -print -quit)" ]; then
              cp -a "$APP_BASE/data/." "$SHARED_DIR/data/"
              mv "$APP_BASE/data" "$APP_BASE/data.migrated.$(date -u +%Y%m%d%H%M%S)"
            else
              echo "Skipping legacy data migration: $SHARED_DIR/data is not empty"
            fi
          fi

          if [ ! -f "$SHARED_DIR/.env" ]; then
            echo "::error::Missing $SHARED_DIR/.env — aborting deploy"
            exit 1
          fi

          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf "$APP_BASE-release.tgz" -C "$RELEASE_DIR"
          rm -f "$APP_BASE-release.tgz"

          if [ -d "$APP_BASE/current" ] && [ ! -L "$APP_BASE/current" ]; then
            echo "::error::$APP_BASE/current exists and is not a symlink — aborting deploy"
            exit 1
          fi

          ln -sfnT "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
          ln -sfnT "$SHARED_DIR/data" "$RELEASE_DIR/data"
          ln -sfnT "$RELEASE_DIR" "$APP_BASE/current"

          cd "$APP_BASE/current"

          # ── Build & start ──────────────────────────────────
          sudo docker compose -p "$COMPOSE_PROJECT_NAME" build
          sudo docker compose -p "$COMPOSE_PROJECT_NAME" up -d

          # ── Health check (up to 30s) ───────────────────────
          healthy=false
          for i in $(seq 1 6); do
            sleep 5
            if sudo docker compose -p "$COMPOSE_PROJECT_NAME" ps | grep -q "Up"; then
              healthy=true
              break
            fi
            echo "Attempt $i/6: container not up yet..."
          done

          if [ "$healthy" = false ]; then
            echo "::error::Container failed to start"
            sudo docker compose -p "$COMPOSE_PROJECT_NAME" ps
            sudo docker compose -p "$COMPOSE_PROJECT_NAME" logs --tail=50 bot
            exit 1
          fi

          # ── Verify bot login / gateway connection (up to 60s) ───────────
          login_seen=false
          for i in $(seq 1 12); do
            if sudo docker compose -p "$COMPOSE_PROJECT_NAME" logs --tail=200 bot | grep -Eq "봇 로그인|connected to Gateway"; then
              login_seen=true
              break
            fi
            sleep 5
            echo "Attempt $i/12: bot login signal not found yet..."
          done

          if [ "$login_seen" = false ]; then
            echo "::error::Bot login or gateway connection message not found in logs"
            sudo docker compose -p "$COMPOSE_PROJECT_NAME" ps
            sudo docker compose -p "$COMPOSE_PROJECT_NAME" logs --tail=100 bot
            exit 1
          fi

          echo "Deploy complete — bot is healthy"
          REMOTE
